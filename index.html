<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX README Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 900px; }
        textarea { resize: vertical; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white p-8 rounded-lg shadow-lg w-full">
        <h1 class="text-4xl font-bold text-center mb-6 text-gray-800">APEX README Builder</h1>
        <p class="text-center text-lg text-gray-600 mb-8">Craft beautiful GitHub READMEs in seconds.</p>

        <form id="readme-form" class="space-y-6">
            <div>
                <label for="project-name" class="block text-gray-700 font-medium mb-2">Project Name</label>
                <input type="text" id="project-name" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="My Awesome Project">
            </div>
            <div>
                <label for="description" class="block text-gray-700 font-medium mb-2">Description</label>
                <textarea id="description" rows="4" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="A brief overview of your project..."></textarea>
            </div>
            <div>
                <label for="features" class="block text-gray-700 font-medium mb-2">Features (one per line)</label>
                <textarea id="features" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="Feature 1\nFeature 2"></textarea>
            </div>
            <div>
                <label for="installation" class="block text-gray-700 font-medium mb-2">Installation</label>
                <textarea id="installation" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="`npm install`\n`yarn start`"></textarea>
            </div>
            <div>
                <label for="usage" class="block text-gray-700 font-medium mb-2">Usage</label>
                <textarea id="usage" rows="3" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="How to use your project..."></textarea>
            </div>
            <div>
                <label for="license" class="block text-gray-700 font-medium mb-2">License</label>
                <select id="license" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="MIT">MIT License</option>
                    <option value="Apache-2.0">Apache 2.0 License</option>
                    <option value="GPL-3.0">GPL 3.0 License</option>
                    <option value="UNLICENSED">Unlicensed</option>
                </select>
            </div>

            <button type="button" id="generate-btn" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-all duration-200">Generate README (Pay $9.99)</button>
        </form>

        <div id="output-section" class="hidden mt-8 border-t pt-8 border-gray-200">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Your README Markdown:</h2>
            <textarea id="markdown-output" rows="15" class="w-full p-3 border border-gray-300 rounded-md bg-gray-50 font-mono text-sm" readonly></textarea>
            <div class="flex space-x-4 mt-4">
                <button id="copy-btn" class="flex-1 bg-green-600 text-white p-3 rounded-md hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-green-300 transition-all duration-200">Copy to Clipboard</button>
                <button id="download-btn" class="flex-1 bg-purple-600 text-white p-3 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-4 focus:ring-purple-300 transition-all duration-200">Download .md</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('generate-btn').addEventListener('click', async () => {
            // In a real app, this would trigger Stripe payment and then backend generation.
            // For this HTML-only example, we'll simulate the generation.
            const projectName = document.getElementById('project-name').value || 'My Project';
            const description = document.getElementById('description').value || 'A brief description of my project.';
            const features = document.getElementById('features').value.split('\n').filter(Boolean).map(f => `- ${f.trim()}`).join('\n') || '- Awesome feature\n- Another cool feature';
            const installation = document.getElementById('installation').value || 'bash\nnpm install\n';
            const usage = document.getElementById('usage').value || 'javascript\nconsole.log("Hello World!");\n';
            const license = document.getElementById('license').value || 'MIT';
            
            const markdown = `# ${projectName}

${description}

## Features

${features}

## Installation

${installation}

## Usage

${usage}

## License

This project is licensed under the ${license} License - see the [LICENSE.md](LICENSE.md) file for details.
`;

            document.getElementById('markdown-output').value = markdown;
            document.getElementById('output-section').classList.remove('hidden');
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const output = document.getElementById('markdown-output');
            output.select();
            document.execCommand('copy');
            alert('README copied to clipboard!');
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            const output = document.getElementById('markdown-output').value;
            const projectName = document.getElementById('project-name').value || 'README';
            const blob = new Blob([output], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${projectName.replace(/[^a-zA-Z0-9]/g, '_')}_README.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
